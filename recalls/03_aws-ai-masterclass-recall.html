<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Synaptix — Recall · M3 · 30 Cards · Hard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0e0e11;--bg-surface:#16161a;--bg-elevated:#1c1c21;--bg-section:#1a1a1f;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.12);
  --orange:#f4762a;--salmon:#f08080;--cyan:#4ecdc4;--green:#4ade80;
  --yellow:#f4d03f;--purple:#c084fc;--sky:#5db8f2;--amber:#f4b942;
  --orange-dim:rgba(244,118,42,0.10);--cyan-dim:rgba(78,205,196,0.10);
  --salmon-dim:rgba(240,128,128,0.10);--green-dim:rgba(74,222,128,0.10);
  --purple-dim:rgba(192,132,252,0.10);--sky-dim:rgba(93,184,242,0.10);
  --text-primary:#e8e8ee;--text-secondary:#8b8b9a;--text-muted:#4a4a5a;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
body{background:var(--bg-base);color:var(--text-primary);font-family:var(--sans);font-size:13px;line-height:1.8;min-height:100vh;}

.rc-header{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:16px 22px 13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.badges{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid;}
.badge-recall{color:var(--cyan);background:var(--cyan-dim);border-color:rgba(78,205,196,0.25)}
.badge-mod{color:var(--sky);background:var(--sky-dim);border-color:rgba(93,184,242,0.25)}
.badge-hard{color:var(--salmon);background:var(--salmon-dim);border-color:rgba(240,128,128,0.25)}
.rc-title{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.rc-sub{font-size:11px;font-family:var(--mono);color:var(--text-muted);margin-top:3px}
.rc-progress-wrap{width:200px}
.rc-progress-label{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-bottom:5px;display:flex;justify-content:space-between;}
.rc-progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.rc-progress-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width 0.3s ease;}

.rc-wrap{max-width:560px;margin:32px auto;padding:0 20px}
.fc-progress{font-family:var(--mono);font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:14px;letter-spacing:0.05em;}
.card-type-label{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;text-align:center;margin-bottom:8px;}
.ctl-term{color:var(--orange)}
.ctl-question{color:var(--purple)}

.fc-scene{perspective:1000px;height:290px;margin-bottom:16px}
.fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.35s ease;}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--bg-section);border:1px solid var(--border);border-radius:12px;padding:26px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.fc-face.fc-back-face{transform:rotateY(180deg);background:var(--bg-elevated);border-color:var(--border-hi)}
.fc-front-text{font-size:13.5px;color:var(--text-primary);line-height:1.75;font-weight:500}
.fc-back-text{font-size:13.5px;color:var(--text-primary);line-height:1.75;font-weight:600}
.fc-back-sub{font-size:12px;color:var(--text-secondary);line-height:1.6;font-weight:400;margin-top:8px}
.fc-ref{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:14px;letter-spacing:0.05em;}
.face-label{font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;position:absolute;top:12px;left:14px;color:var(--text-muted);}
.face-label-back{color:var(--cyan)}

.fc-flip-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:46px;border-radius:10px;background:var(--orange-dim);border:1px solid rgba(244,118,42,0.3);color:var(--orange);font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s;margin-bottom:10px;}
.fc-flip-btn:hover{background:rgba(244,118,42,0.18)}
.fc-actions{display:none;gap:10px;margin-bottom:10px}
.fc-btn{flex:1;height:46px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;border:1px solid;transition:background 0.15s;}
.fc-btn-got{color:var(--green);background:var(--green-dim);border-color:rgba(74,222,128,0.3)}
.fc-btn-missed{color:var(--salmon);background:var(--salmon-dim);border-color:rgba(240,128,128,0.3)}
.fc-btn-got:hover{background:rgba(74,222,128,0.18)}
.fc-btn-missed:hover{background:rgba(240,128,128,0.18)}
.fc-nav{display:flex;gap:8px;margin-top:4px}
.fc-nav-btn{flex:1;height:36px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-secondary);font-family:var(--mono);font-size:11px;cursor:pointer;transition:background 0.15s;}
.fc-nav-btn:hover{background:rgba(255,255,255,0.08)}

.score-strip{display:flex;justify-content:center;gap:20px;margin-top:14px;padding:10px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;}
.ss-item{text-align:center}
.ss-val{font-family:var(--mono);font-size:16px;font-weight:600}
.ss-lbl{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-top:2px}
.ss-got{color:var(--green)}
.ss-missed{color:var(--salmon)}
.ss-remain{color:var(--text-secondary)}

.fc-summary{background:var(--bg-section);border:1px solid var(--border);border-radius:12px;padding:32px 24px;text-align:center;}
.fc-sum-title{font-size:16px;font-weight:600;margin-bottom:18px}
.fc-sum-score{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--cyan);letter-spacing:-0.02em;margin-bottom:6px}
.fc-sum-detail{font-size:13px;color:var(--text-secondary);margin-bottom:16px}
.fc-sum-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.fc-sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:7px;font-size:13px;}
.fc-sum-row-lbl{color:var(--text-secondary)}
.fc-sum-val-g{color:var(--green);font-family:var(--mono);font-weight:600}
.fc-sum-val-m{color:var(--salmon);font-family:var(--mono);font-weight:600}
.fc-sum-review{background:rgba(244,208,63,0.05);border:1px solid rgba(244,208,63,0.15);border-radius:7px;padding:10px 14px;font-size:12px;color:var(--yellow);margin-bottom:16px;text-align:left;}
.fc-sum-review-lbl{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px}
.fc-sum-restart{width:100%;height:46px;border-radius:10px;background:var(--cyan-dim);border:1px solid rgba(78,205,196,0.3);color:var(--cyan);font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s;}
.fc-sum-restart:hover{background:rgba(78,205,196,0.18)}

.rc-footer{padding:12px 26px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg-surface);flex-wrap:wrap;gap:10px;margin-top:24px;}
.footer-left{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.footer-btns{display:flex;gap:10px}
.footer-btn{display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--mono);font-size:11px;font-weight:500;width:128px;height:64px;border-radius:20px;border:1px solid;background:transparent;cursor:pointer;letter-spacing:0.03em;transition:all 0.15s;}
.footer-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.btn-quiz{color:var(--orange);border-color:rgba(244,118,42,0.35);background:var(--orange-dim)}
.btn-quiz:hover{background:rgba(244,118,42,0.18)}
.btn-export{color:var(--salmon);border-color:rgba(240,128,128,0.35);background:var(--salmon-dim)}
.btn-export:hover{background:rgba(240,128,128,0.15)}

@media(max-width:560px){
  .rc-wrap{padding:0 14px;margin:20px auto}
  .rc-header{padding:14px 16px 11px}
  .rc-progress-wrap{width:100%}
  .fc-scene{height:310px}
  .rc-footer{padding:12px 16px}
  .footer-btn{width:100px;height:52px;font-size:10px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="rc-header">
  <div>
    <div class="badges">
      <span class="badge badge-recall">Recall</span>
      <span class="badge badge-mod">Module 3</span>
      <span class="badge badge-hard">Hard</span>
    </div>
    <div class="rc-title">Responsible Artificial Intelligence Practices</div>
    <div class="rc-sub">Mixed · 30 cards · 15 term + 15 question · AWS-AI MasterClass</div>
  </div>
  <div class="rc-progress-wrap">
    <div class="rc-progress-label">
      <span id="prog-label">Card 1 of 30</span>
      <span id="prog-pct">3%</span>
    </div>
    <div class="rc-progress-bar"><div class="rc-progress-fill" id="prog-fill" style="width:3.33%"></div></div>
  </div>
</div>

<!-- CARD AREA -->
<div class="rc-wrap">
  <div class="fc-progress" id="fc-progress">Card 1 of 30</div>
  <div id="card-type-label" class="card-type-label ctl-term">Term</div>

  <div class="fc-scene">
    <div class="fc-card" id="fc-card">
      <div class="fc-face">
        <span class="face-label">Prompt</span>
        <div class="fc-front-text" id="fc-front"></div>
      </div>
      <div class="fc-face fc-back-face">
        <span class="face-label face-label-back">Answer</span>
        <div class="fc-back-text" id="fc-back-main"></div>
        <div class="fc-back-sub" id="fc-back-sub"></div>
        <div class="fc-ref" id="fc-ref"></div>
      </div>
    </div>
  </div>

  <div class="score-strip">
    <div class="ss-item"><div class="ss-val ss-got" id="ss-got">0</div><div class="ss-lbl">Got It</div></div>
    <div class="ss-item"><div class="ss-val ss-remain" id="ss-remain">30</div><div class="ss-lbl">Remaining</div></div>
    <div class="ss-item"><div class="ss-val ss-missed" id="ss-missed">0</div><div class="ss-lbl">Missed</div></div>
  </div>

  <div style="margin-top:12px">
    <button class="fc-flip-btn" id="fc-flip-btn" onclick="_fc.flip()">Flip Card ›</button>
    <div class="fc-actions" id="fc-actions">
      <button class="fc-btn fc-btn-got" onclick="_fc.mark(true)">Got it</button>
      <button class="fc-btn fc-btn-missed" onclick="_fc.mark(false)">Missed it</button>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" onclick="_fc.prev()">← Prev</button>
      <button class="fc-nav-btn" onclick="_fc.next()">Next →</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="rc-footer">
  <div class="footer-left">/recall mixed(30) hard · Module 3 · Synaptix v2.2</div>
  <div class="footer-btns">
    <button class="footer-btn btn-quiz" onclick="sendPrompt('/quiz mc(20) tof(20) connect(10)')">
      <div class="footer-dot" style="background:var(--orange)"></div>Quiz
    </button>
    <button class="footer-btn btn-export" onclick="sendPrompt('/export -md')">
      <div class="footer-dot" style="background:var(--salmon)"></div>Export
    </button>
  </div>
</div>

<script>
function sendPrompt(t){if(window.parent&&window.parent.postMessage)window.parent.postMessage({type:'user_message',message:t},'*');}

/* ─────────────────────────────────────
   CARD DATA — 30 cards · mixed · hard
   15 TERM (T1–T15) + 15 QUESTION (Q1–Q15)
───────────────────────────────────────*/
var CARDS=[

// ── TERM CARDS (1–15) ──
{type:'term',
 front:'The state of a model with high bias and low variance — too simple to capture the true pattern.',
 back:'Underfitting',
 sub:'Symptom: poor performance on both training AND test data. Caused by a model that is too simple or has too few features.',
 section:'B1'},

{type:'term',
 front:'The state of a model with low bias and high variance — memorizes training noise, fails on new data.',
 back:'Overfitting',
 sub:'Symptom: excellent training accuracy, poor test/deployment accuracy. Model learned the noise, not the signal.',
 section:'B1'},

{type:'term',
 front:'The target model state: low bias AND low variance — generalizes well to unseen data.',
 back:'Balanced Model',
 sub:'The goal of bias-variance mitigation. Neither underfitting nor overfitting.',
 section:'B1'},

{type:'term',
 front:'Mitigation technique that stops training when validation performance begins to deteriorate — preventing further memorization.',
 back:'Early Stopping',
 sub:'Prevents the model from continuing past the point of good generalization into memorization territory.',
 section:'B2'},

{type:'term',
 front:'Mitigation technique that penalizes model complexity during training — discourages overly specific parameter values. Two forms: L1 and L2.',
 back:'Regularization',
 sub:'L1 (Lasso) drives some weights to zero. L2 (Ridge) shrinks all weights proportionally. Both reduce overfitting.',
 section:'B2'},

{type:'term',
 front:'Responsible AI dimension addressing WHY a specific decision was made — human-understandable reasoning per output.',
 back:'Explainability',
 sub:'Distinct from Transparency (HOW). Explainability operates at the prediction level; Transparency at the system level.',
 section:'C1'},

{type:'term',
 front:'Responsible AI dimension addressing HOW the model works — visible processes, architecture, and training documentation.',
 back:'Transparency',
 sub:'System-level visibility. Distinct from Explainability (WHY per prediction).',
 section:'C1'},

{type:'term',
 front:'AWS service that detects bias at the feature level and provides feature importance scores for explainability.',
 back:'Amazon SageMaker Clarify',
 sub:'Supports pre-training bias detection and post-training model bias detection. Visual reports and metrics. Works on tabular, NLP, and CV models.',
 section:'D2'},

{type:'term',
 front:'AWS service that balances datasets using random undersampling, random oversampling, and SMOTE.',
 back:'Amazon SageMaker Data Wrangler',
 sub:'SMOTE = Synthetic Minority Over-sampling Technique — creates synthetic samples via interpolation, not duplication.',
 section:'D2'},

{type:'term',
 front:'AWS service that tracks production model performance, detects data drift, and sends anomaly alerts.',
 back:'Amazon SageMaker Model Monitor',
 sub:'Monitors models after deployment. Key use case: detecting when input distribution shifts from training data (data drift).',
 section:'D2'},

{type:'term',
 front:'AWS service that routes low-confidence model predictions to human reviewers for manual validation.',
 back:'Amazon A2I (Augmented AI)',
 sub:'Human-in-the-loop workflow. Enables manual validation before acting on uncertain predictions.',
 section:'D2'},

{type:'term',
 front:'Explainability technique that assigns each feature a contribution score for a specific prediction using game theory principles.',
 back:'SHAP (SHapley Additive exPlanations)',
 sub:'Globally accurate — explains both individual predictions and overall model behavior. More computationally expensive than LIME.',
 section:'G3'},

{type:'term',
 front:'Explainability technique that builds a simple, interpretable approximation model locally around a specific prediction — model-agnostic.',
 back:'LIME (Local Interpretable Model-agnostic Explanations)',
 sub:'Does not require access to model internals. Local approximation only — not globally accurate across all predictions.',
 section:'G3'},

{type:'term',
 front:'Explainability technique that answers: "What would need to change for a different outcome?" — actionable and human-understandable.',
 back:'Counterfactual Explanations',
 sub:'Example: "Your loan was denied. If income were $5,000 higher, it would have been approved." Most intuitive for end users.',
 section:'G3'},

{type:'term',
 front:'Technique for aligning AI model behavior with human values: humans rate outputs → reward model trained → FM fine-tuned to maximize reward.',
 back:'RLHF (Reinforcement Learning from Human Feedback)',
 sub:'AWS tool: SageMaker Ground Truth manages the human labeling and feedback collection for RLHF workflows.',
 section:'I3'},


// ── QUESTION CARDS (16–30) ──
{type:'question',
 front:'What is the core goal of Responsible AI, and at which lifecycle stages does it apply?',
 back:'Goal: minimize harm and ensure accountability while building ethical, transparent, trustworthy AI systems. It applies at ALL five stages: Design · Development · Deployment · Monitoring · Evaluation.',
 sub:'Responsible AI is never just a deployment checklist — it spans the full lifecycle from first design decision to continuous production oversight.',
 section:'A1–A2'},

{type:'question',
 front:'How do bias and variance differ as sources of model error, and what does each cause?',
 back:'Bias = model misses key data features → underfitting (high bias, low variance — poor everywhere). Variance = model memorizes noise → overfitting (low bias, high variance — good training, crashes on deploy). Target: balanced (both low).',
 sub:'The bias-variance trade-off means reducing one often increases the other. The goal is the optimal balance point.',
 section:'B1'},

{type:'question',
 front:'Name all six bias-variance mitigation techniques and the problem each primarily addresses.',
 back:'Cross-Validation (detect overfitting) · Increase Data (reduce noise sensitivity) · Regularization (penalize complexity) · Simpler Models (reduce memorization capacity) · Dimensionality Reduction (remove noisy features) · Early Stopping (prevent continued memorization).',
 sub:'Practitioners typically combine multiple techniques. No single technique is universally sufficient.',
 section:'B2'},

{type:'question',
 front:'What are the five Generative AI-specific responsible AI challenges that do not apply to traditional ML?',
 back:'Toxicity · Hallucinations · Intellectual Property violations · Plagiarism / Cheating · Work Disruption.',
 sub:'Hallucination = plausible but false — the primary exam-tested risk. These arise because Gen AI outputs are open-ended and harder to verify than structured ML predictions.',
 section:'B3'},

{type:'question',
 front:'List all eight core dimensions of Responsible AI and identify which two are most commonly confused.',
 back:'Fairness · Explainability · Transparency · Privacy & Security · Veracity & Robustness · Governance · Safety · Controllability. Most confused: Transparency (HOW the system works) vs. Explainability (WHY a specific decision was made).',
 sub:'No single dimension is sufficient. All eight must be addressed for fully responsible AI.',
 section:'C1'},

{type:'question',
 front:'What is the precise difference between Transparency and Explainability in Responsible AI?',
 back:'Transparency = HOW the model works at the system level — architecture, training data, development process. Explainability = WHY a specific prediction was made — feature contributions and decision rationale per output.',
 sub:'Example: "This model was trained on X data using Y algorithm" = Transparency. "This loan was denied because income was weighted 0.6" = Explainability.',
 section:'C2'},

{type:'question',
 front:'What is the key platform distinction between Amazon SageMaker and Amazon Bedrock for responsible AI?',
 back:'SageMaker = ML lifecycle platform — build, train, deploy custom models; owns bias detection, explainability, monitoring, governance. Bedrock = Gen AI / FM platform — FM API access, serverless; owns FM evaluation and Guardrails for Gen AI safety.',
 sub:'High exam priority. These roles are distinct and tested directly.',
 section:'D1'},

{type:'question',
 front:'What are the five capabilities of Guardrails for Amazon Bedrock, and what makes them architecturally distinct from model-specific safety?',
 back:'Five capabilities: Block Undesirable Topics · Filter Harmful Content · Redact PII · Policy Enforcement · Real-Time Monitoring. They are architecturally distinct because they apply across ALL Foundation Models in Bedrock — not specific to any individual model.',
 sub:'Guardrails add an extra safety layer at the application level. They do not replace model selection or fine-tuning.',
 section:'D3'},

{type:'question',
 front:'What does SMOTE do differently from standard random oversampling, and why does this matter?',
 back:'Standard oversampling duplicates existing minority samples — risking overfitting to those exact examples. SMOTE creates NEW synthetic samples by interpolating between existing minority samples — producing more diverse training examples and reducing overfitting risk.',
 sub:'SMOTE = Synthetic Minority Over-sampling Technique. Available in SageMaker Data Wrangler alongside random undersample and oversample.',
 section:'D4'},

{type:'question',
 front:'What are the five factors in the responsible model selection framework, and which is the prerequisite?',
 back:'Use Case (prerequisite — define target audience, expected output, constraints first) · Performance (customization, model size, latency, context window, licensing) · Sustainability (energy, carbon, hardware) · Responsible Agency (value alignment, reasoning, autonomy, accountability) · Economic Considerations (efficiency, displacement, market impact).',
 sub:'"Use Case ≠ Technology" — defining a task type is not a use case. Model performance is always dataset-relative.',
 section:'E1'},

{type:'question',
 front:'Why is "data bias = model bias" the foundational principle of responsible dataset preparation?',
 back:'A model learns patterns from its training data — if the data systematically underrepresents or misrepresents groups, the model learns and perpetuates those patterns. No algorithm, no matter how sophisticated, can compensate for a fundamentally biased dataset.',
 sub:'Four preparation principles: Balance · Inclusive Collection · Curation (preprocess + augment + audit) · Use Case Alignment.',
 section:'F1'},

{type:'question',
 front:'What are the four risks of implementing explainability, and which one creates adversarial vulnerability?',
 back:'Higher Cost (extra compute per explanation) · Security Risk (feature importance scores reveal model internals → adversarial attacks — this one creates vulnerability) · Privacy Exposure (explanations may reveal training data individuals) · False Transparency (LIME approximations ≠ the actual model).',
 sub:'The security risk is the most counterintuitive — explainability intended to help stakeholders can also help adversaries craft targeted attacks.',
 section:'G4'},

{type:'question',
 front:'A model performs at 98% accuracy on training data and 61% on the test set. What is the diagnosis, root cause, and three applicable mitigations?',
 back:'Diagnosis: Overfitting (low bias, high variance). Root cause: model memorized training noise instead of learning generalizable patterns. Three mitigations (any of): Regularization · Simpler Model · Early Stopping · Cross-Validation · Increase Data · Dimensionality Reduction.',
 sub:'The large gap between training and test accuracy is the signature of overfitting. The model is "too comfortable" with training data.',
 section:'B1–B2'},

{type:'question',
 front:'What are the four inevitable model trade-offs in responsible AI system design, and what is the correct approach to handling them?',
 back:'Interpretability vs. Performance · Privacy vs. Transparency · Security vs. Auditability · Filtering vs. Usefulness. Correct approach: make them explicit and deliberate — not accidental. Responsible AI does not eliminate trade-offs; it manages them consciously.',
 sub:'Controllability (ability to steer/override outputs) mediates many of these trade-offs but is architecture-dependent.',
 section:'H1'},

{type:'question',
 front:'What are the five Human-Centered Design principles for amplified decision-making, and what does "Reflexivity" mean in this context?',
 back:'Clarity · Simplicity · Usability · Reflexivity · Accountability. Reflexivity = designing the system to support users in questioning and challenging AI outputs — building critical thinking in, not out. Users should be empowered to push back on AI decisions.',
 sub:'HCD goal: AI that serves users in their actual context — not just in controlled evaluations. Accountability = clear ownership of outcomes (human, organization, or both).',
 section:'I1'}
];

/* ── ENGINE ── */
var _fc={
  idx:0,got:0,missed:0,results:{},
  init:function(){this.idx=0;this.got=0;this.missed=0;this.results={};this.render();},
  render:function(){
    var c=CARDS[this.idx];
    if(!c){this.summary();return;}
    var n=this.idx+1,total=CARDS.length;
    var pct=Math.round(n/total*100);
    document.getElementById('fc-progress').textContent='Card '+n+' of '+total;
    document.getElementById('prog-label').textContent='Card '+n+' of '+total;
    document.getElementById('prog-pct').textContent=pct+'%';
    document.getElementById('prog-fill').style.width=pct+'%';
    var lbl=document.getElementById('card-type-label');
    lbl.textContent=c.type==='term'?'Term':'Question';
    lbl.className='card-type-label '+(c.type==='term'?'ctl-term':'ctl-question');
    document.getElementById('fc-front').textContent=c.front;
    document.getElementById('fc-back-main').textContent=c.back;
    var sub=document.getElementById('fc-back-sub');
    sub.textContent=c.sub||'';
    sub.style.display=c.sub?'block':'none';
    document.getElementById('fc-ref').textContent=c.section+' · Module 3';
    document.getElementById('fc-card').classList.remove('flipped');
    document.getElementById('fc-flip-btn').style.display='flex';
    document.getElementById('fc-actions').style.display='none';
    document.getElementById('ss-got').textContent=this.got;
    document.getElementById('ss-missed').textContent=this.missed;
    document.getElementById('ss-remain').textContent=total-this.got-this.missed;
  },
  flip:function(){
    document.getElementById('fc-card').classList.add('flipped');
    document.getElementById('fc-flip-btn').style.display='none';
    document.getElementById('fc-actions').style.display='flex';
  },
  mark:function(ok){
    this.results[this.idx]=ok;
    if(ok)this.got++;else this.missed++;
    this.idx++;
    if(this.idx>=CARDS.length){this.summary();return;}
    this.render();
  },
  next:function(){if(this.idx<CARDS.length-1){this.idx++;this.render();}},
  prev:function(){if(this.idx>0){this.idx--;this.render();}},
  summary:function(){
    var total=CARDS.length;
    var pct=total>0?Math.round(this.got/total*100):0;
    var ms=[];
    for(var i in this.results){if(!this.results[i]){var s=CARDS[i].section;if(ms.indexOf(s)===-1)ms.push(s);}}
    ms.sort();
    var rh=ms.length>0?'<div class="fc-sum-review"><div class="fc-sum-review-lbl">Sections to Review</div>'+ms.join(' · ')+'</div>':'';
    var html='<div class="fc-summary">'+
      '<div class="fc-sum-title">Session Complete — '+total+' cards</div>'+
      '<div class="fc-sum-score">'+pct+'%</div>'+
      '<div class="fc-sum-detail">'+this.got+' got it · '+this.missed+' missed</div>'+
      '<div class="fc-sum-rows">'+
        '<div class="fc-sum-row"><span class="fc-sum-row-lbl">Got it</span><span class="fc-sum-val-g">'+this.got+' / '+total+'</span></div>'+
        '<div class="fc-sum-row"><span class="fc-sum-row-lbl">Missed it</span><span class="fc-sum-val-m">'+this.missed+' / '+total+'</span></div>'+
      '</div>'+rh+
      '<button class="fc-sum-restart" onclick="_fc.restart()">Restart Session</button>'+
    '</div>';
    document.getElementById('fc-progress').style.display='none';
    document.getElementById('card-type-label').style.display='none';
    document.querySelector('.fc-scene').innerHTML=html;
    document.querySelector('.score-strip').style.display='none';
    document.getElementById('fc-flip-btn').style.display='none';
    document.getElementById('fc-actions').style.display='none';
    document.querySelector('.fc-nav').style.display='none';
    document.getElementById('prog-label').textContent='Complete';
    document.getElementById('prog-pct').textContent='100%';
    document.getElementById('prog-fill').style.width='100%';
  },
  restart:function(){
    document.querySelector('.fc-scene').innerHTML=
      '<div class="fc-card" id="fc-card">'+
        '<div class="fc-face"><span class="face-label">Prompt</span><div class="fc-front-text" id="fc-front"></div></div>'+
        '<div class="fc-face fc-back-face"><span class="face-label face-label-back">Answer</span><div class="fc-back-text" id="fc-back-main"></div><div class="fc-back-sub" id="fc-back-sub"></div><div class="fc-ref" id="fc-ref"></div></div>'+
      '</div>';
    document.getElementById('fc-progress').style.display='block';
    document.getElementById('card-type-label').style.display='block';
    document.querySelector('.score-strip').style.display='flex';
    document.getElementById('fc-flip-btn').style.display='flex';
    document.querySelector('.fc-nav').style.display='flex';
    this.init();
  }
};
_fc.init();
</script>
</body>
</html>
