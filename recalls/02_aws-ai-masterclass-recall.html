<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Synaptix — Recall · M2 · 30 Cards · Hard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0e0e11;--bg-surface:#16161a;--bg-elevated:#1c1c21;--bg-section:#1a1a1f;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.12);
  --orange:#f4762a;--salmon:#f08080;--cyan:#4ecdc4;--green:#4ade80;
  --yellow:#f4d03f;--purple:#c084fc;--sky:#5db8f2;--amber:#f4b942;
  --orange-dim:rgba(244,118,42,0.10);--cyan-dim:rgba(78,205,196,0.10);
  --salmon-dim:rgba(240,128,128,0.10);--green-dim:rgba(74,222,128,0.10);
  --purple-dim:rgba(192,132,252,0.10);--sky-dim:rgba(93,184,242,0.10);
  --text-primary:#e8e8ee;--text-secondary:#8b8b9a;--text-muted:#4a4a5a;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
body{background:var(--bg-base);color:var(--text-primary);font-family:var(--sans);font-size:13px;line-height:1.8;min-height:100vh;}

/* Header */
.rc-header{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:16px 22px 13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.badges{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid;}
.badge-recall{color:var(--cyan);background:var(--cyan-dim);border-color:rgba(78,205,196,0.25)}
.badge-mod{color:var(--sky);background:var(--sky-dim);border-color:rgba(93,184,242,0.25)}
.badge-hard{color:var(--salmon);background:var(--salmon-dim);border-color:rgba(240,128,128,0.25)}
.rc-title{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.rc-sub{font-size:11px;font-family:var(--mono);color:var(--text-muted);margin-top:3px}
.rc-progress-wrap{width:200px}
.rc-progress-label{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-bottom:5px;display:flex;justify-content:space-between;}
.rc-progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.rc-progress-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width 0.3s ease;}

/* Main */
.rc-wrap{max-width:560px;margin:32px auto;padding:0 20px}
.fc-progress{font-family:var(--mono);font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:14px;letter-spacing:0.05em;}
.card-type-label{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;text-align:center;margin-bottom:8px;}
.ctl-term{color:var(--orange)}
.ctl-question{color:var(--purple)}

/* Flip card */
.fc-scene{perspective:1000px;height:280px;margin-bottom:16px}
.fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.35s ease;}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--bg-section);border:1px solid var(--border);border-radius:12px;padding:28px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.fc-face.fc-back-face{transform:rotateY(180deg);background:var(--bg-elevated);border-color:var(--border-hi)}
.fc-front-text{font-size:14px;color:var(--text-primary);line-height:1.75;font-weight:500}
.fc-back-text{font-size:14px;color:var(--text-primary);line-height:1.75;font-weight:600}
.fc-back-sub{font-size:12px;color:var(--text-secondary);line-height:1.6;font-weight:400;margin-top:8px}
.fc-ref{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:14px;letter-spacing:0.05em;}
.face-label{font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;position:absolute;top:12px;left:14px;color:var(--text-muted);}
.face-label-back{color:var(--cyan)}

/* Controls */
.fc-flip-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:46px;border-radius:10px;background:var(--orange-dim);border:1px solid rgba(244,118,42,0.3);color:var(--orange);font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s;margin-bottom:10px;}
.fc-flip-btn:hover{background:rgba(244,118,42,0.18)}
.fc-actions{display:none;gap:10px;margin-bottom:10px}
.fc-btn{flex:1;height:46px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;border:1px solid;transition:background 0.15s;}
.fc-btn-got{color:var(--green);background:var(--green-dim);border-color:rgba(74,222,128,0.3)}
.fc-btn-missed{color:var(--salmon);background:var(--salmon-dim);border-color:rgba(240,128,128,0.3)}
.fc-btn-got:hover{background:rgba(74,222,128,0.18)}
.fc-btn-missed:hover{background:rgba(240,128,128,0.18)}
.fc-nav{display:flex;gap:8px;margin-top:4px}
.fc-nav-btn{flex:1;height:36px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-secondary);font-family:var(--mono);font-size:11px;cursor:pointer;transition:background 0.15s;}
.fc-nav-btn:hover{background:rgba(255,255,255,0.08)}

/* Score strip */
.score-strip{display:flex;justify-content:center;gap:20px;margin-top:14px;padding:10px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;}
.ss-item{text-align:center}
.ss-val{font-family:var(--mono);font-size:16px;font-weight:600}
.ss-lbl{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-top:2px}
.ss-got{color:var(--green)}
.ss-missed{color:var(--salmon)}
.ss-remain{color:var(--text-secondary)}

/* Summary */
.fc-summary{background:var(--bg-section);border:1px solid var(--border);border-radius:12px;padding:32px 24px;text-align:center;}
.fc-sum-title{font-size:16px;font-weight:600;margin-bottom:18px}
.fc-sum-score{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--cyan);letter-spacing:-0.02em;margin-bottom:6px}
.fc-sum-detail{font-size:13px;color:var(--text-secondary);margin-bottom:16px}
.fc-sum-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.fc-sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:7px;font-size:13px;}
.fc-sum-row-lbl{color:var(--text-secondary)}
.fc-sum-val-g{color:var(--green);font-family:var(--mono);font-weight:600}
.fc-sum-val-m{color:var(--salmon);font-family:var(--mono);font-weight:600}
.fc-sum-review{background:rgba(244,208,63,0.05);border:1px solid rgba(244,208,63,0.15);border-radius:7px;padding:10px 14px;font-size:12px;color:var(--yellow);margin-bottom:16px;text-align:left;}
.fc-sum-review-lbl{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px}
.fc-sum-restart{width:100%;height:46px;border-radius:10px;background:var(--cyan-dim);border:1px solid rgba(78,205,196,0.3);color:var(--cyan);font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s;}
.fc-sum-restart:hover{background:rgba(78,205,196,0.18)}

/* Footer */
.rc-footer{padding:12px 26px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg-surface);flex-wrap:wrap;gap:10px;margin-top:24px;}
.footer-left{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.footer-btns{display:flex;gap:10px}
.footer-btn{display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--mono);font-size:11px;font-weight:500;width:128px;height:64px;border-radius:20px;border:1px solid;background:transparent;cursor:pointer;letter-spacing:0.03em;transition:all 0.15s;}
.footer-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.btn-quiz{color:var(--orange);border-color:rgba(244,118,42,0.35);background:var(--orange-dim)}
.btn-quiz:hover{background:rgba(244,118,42,0.18)}
.btn-export{color:var(--salmon);border-color:rgba(240,128,128,0.35);background:var(--salmon-dim)}
.btn-export:hover{background:rgba(240,128,128,0.15)}

@media(max-width:560px){
  .rc-wrap{padding:0 14px;margin:20px auto}
  .rc-header{padding:14px 16px 11px}
  .rc-progress-wrap{width:100%}
  .fc-scene{height:300px}
  .rc-footer{padding:12px 16px}
  .footer-btn{width:100px;height:52px;font-size:10px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="rc-header">
  <div>
    <div class="badges">
      <span class="badge badge-recall">Recall</span>
      <span class="badge badge-mod">Module 2</span>
      <span class="badge badge-hard">Hard</span>
    </div>
    <div class="rc-title">AI Use Cases and Applications</div>
    <div class="rc-sub">Mixed · 30 cards · 15 term + 15 question · AWS-AI MasterClass</div>
  </div>
  <div class="rc-progress-wrap">
    <div class="rc-progress-label">
      <span id="prog-label">Card 1 of 30</span>
      <span id="prog-pct">3%</span>
    </div>
    <div class="rc-progress-bar"><div class="rc-progress-fill" id="prog-fill" style="width:3.33%"></div></div>
  </div>
</div>

<!-- CARD AREA -->
<div class="rc-wrap">
  <div class="fc-progress" id="fc-progress">Card 1 of 30</div>
  <div id="card-type-label" class="card-type-label ctl-term">Term</div>

  <div class="fc-scene">
    <div class="fc-card" id="fc-card">
      <div class="fc-face">
        <span class="face-label">Prompt</span>
        <div class="fc-front-text" id="fc-front"></div>
      </div>
      <div class="fc-face fc-back-face">
        <span class="face-label face-label-back">Answer</span>
        <div class="fc-back-text" id="fc-back-main"></div>
        <div class="fc-back-sub" id="fc-back-sub"></div>
        <div class="fc-ref" id="fc-ref"></div>
      </div>
    </div>
  </div>

  <div class="score-strip">
    <div class="ss-item"><div class="ss-val ss-got" id="ss-got">0</div><div class="ss-lbl">Got It</div></div>
    <div class="ss-item"><div class="ss-val ss-remain" id="ss-remain">30</div><div class="ss-lbl">Remaining</div></div>
    <div class="ss-item"><div class="ss-val ss-missed" id="ss-missed">0</div><div class="ss-lbl">Missed</div></div>
  </div>

  <div style="margin-top:12px">
    <button class="fc-flip-btn" id="fc-flip-btn" onclick="_fc.flip()">Flip Card ›</button>
    <div class="fc-actions" id="fc-actions">
      <button class="fc-btn fc-btn-got" onclick="_fc.mark(true)">Got it</button>
      <button class="fc-btn fc-btn-missed" onclick="_fc.mark(false)">Missed it</button>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" onclick="_fc.prev()">← Prev</button>
      <button class="fc-nav-btn" onclick="_fc.next()">Next →</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="rc-footer">
  <div class="footer-left">/recall mixed(30) hard · Module 2 · Synaptix v2.2</div>
  <div class="footer-btns">
    <button class="footer-btn btn-quiz" onclick="sendPrompt('/quiz mc(10) hard')">
      <div class="footer-dot" style="background:var(--orange)"></div>Quiz
    </button>
    <button class="footer-btn btn-export" onclick="sendPrompt('/export -md')">
      <div class="footer-dot" style="background:var(--salmon)"></div>Export
    </button>
  </div>
</div>

<script>
function sendPrompt(t){if(window.parent&&window.parent.postMessage)window.parent.postMessage({type:'user_message',message:t},'*');}

/* ─────────────────────────────────────────
   CARD DATA — 30 cards · mixed · hard
   15 TERM (T1–T15) + 15 QUESTION (Q1–Q15)
   Sections: A1–A2, B1–B2, C1–C4, D1, E1–E3, F1, G1–G2, H1–H3, I1
───────────────────────────────────────── */
var CARDS = [
  // ── TERM CARDS (1–15) ──
  {type:'term',
   front:'The three mechanisms through which AI creates business value across all industries.',
   back:'Automation · Optimization · Personalization',
   sub:'Automation replaces manual work; Optimization improves decisions beyond human capacity; Personalization tailors at scale.',
   section:'B1'},

  {type:'term',
   front:'AWS service that automatically generates structured clinical notes from provider-patient conversations.',
   back:'AWS HealthScribe',
   sub:'Healthcare industry use case — clinical documentation via AI.',
   section:'B2'},

  {type:'term',
   front:'The three core tasks of Computer Vision, listed in order of increasing granularity.',
   back:'Image Classification → Object Detection → Segmentation',
   sub:'Classification = whole-image label · Detection = locate + label objects · Segmentation = pixel-level analysis.',
   section:'C1'},

  {type:'term',
   front:'AWS service for image and video analysis — object detection, facial analysis, content moderation.',
   back:'Amazon Rekognition',
   sub:'Primary Computer Vision service on AWS.',
   section:'C1'},

  {type:'term',
   front:'AI application domain that applies ML to extract structured data from PDFs, scanned forms, contracts, and records.',
   back:'Intelligent Document Processing (IDP)',
   sub:'Three functions: Data Extraction · Classification · Summarization. AWS: Amazon Textract.',
   section:'C3'},

  {type:'term',
   front:'AWS service that extracts text, tables, and form fields from scanned documents using OCR.',
   back:'Amazon Textract',
   sub:'Primary IDP service on AWS — distinct from Comprehend (NLP insights) and Rekognition (images).',
   section:'C3'},

  {type:'term',
   front:'Supervised learning subtype that predicts a categorical output — one of a fixed set of classes.',
   back:'Classification',
   sub:'Examples: fraud detection (fraud/not fraud), image classification (cat/dog), medical diagnostics.',
   section:'E1'},

  {type:'term',
   front:'Supervised learning subtype that predicts a continuous numeric output along a range.',
   back:'Regression',
   sub:'Examples: weather forecasting (temperature), market trend prediction (price), life expectancy.',
   section:'E1'},

  {type:'term',
   front:'Unsupervised learning technique that groups similar data points without predefined categories.',
   back:'Clustering',
   sub:'Use cases: customer segmentation, targeted marketing, recommendation systems.',
   section:'E2'},

  {type:'term',
   front:'Unsupervised learning technique that reduces the number of input features while preserving structure.',
   back:'Dimensionality Reduction',
   sub:'Use cases: data visualization, compression, feature extraction.',
   section:'E2'},

  {type:'term',
   front:'Generative AI risk: outputs that are plausible-sounding but factually incorrect, produced because the model predicts likely text rather than correct text.',
   back:'Hallucinations',
   sub:'Primary exam-tested risk. Mitigation: Guardrails + Verification (RAG grounds outputs in facts).',
   section:'G1'},

  {type:'term',
   front:'Generative AI risk: the same input can produce different outputs across runs — problematic for high-stakes reproducible applications.',
   back:'Nondeterminism',
   sub:'Distinct from hallucination — this is about consistency, not factual accuracy.',
   section:'G1'},

  {type:'term',
   front:'Foundation Model suited for embeddings, semantic search, and Q&A — AWS-native, accessible via Bedrock.',
   back:'Amazon Titan',
   sub:'AWS-native FM family. Distinct from Claude (chat/reasoning) and Stable Diffusion (images).',
   section:'H2'},

  {type:'term',
   front:'Foundation Model purpose-built for image generation from text prompts.',
   back:'Stable Diffusion',
   sub:'Leading open-source diffusion model. The only image-generation FM in the M2 examples list.',
   section:'H2'},

  {type:'term',
   front:'Business metric that measures the percentage of users completing a desired action — purchase, sign-up, or click.',
   back:'Conversion Rate',
   sub:'Direct indicator of whether AI-driven personalization or recommendations change user behavior.',
   section:'I1'},

  // ── QUESTION CARDS (16–30) ──
  {type:'question',
   front:'What is the key distinction between Generative AI and traditional ML, and why does it matter for industry use cases?',
   back:'Generative AI creates new content. Traditional ML analyzes or predicts from existing data.',
   sub:'This determines which tool applies: text/image/audio generation → Gen AI; classification/anomaly detection → ML.',
   section:'A1'},

  {type:'question',
   front:'A media company wants to automatically write article summaries from raw reports. A finance firm wants to detect unusual transaction patterns. Which AI paradigm applies to each — and why?',
   back:'Media: Generative AI (creates summaries — new content). Finance: Traditional ML (detects anomalies — analyzes existing patterns).',
   sub:'Creation → Gen AI. Analysis/prediction → ML. The output type determines the paradigm.',
   section:'A1'},

  {type:'question',
   front:'What are the three functions of Intelligent Document Processing (IDP), and how does IDP differ from NLP?',
   back:'IDP functions: Data Extraction · Classification · Summarization. IDP is a superset workflow that applies NLP (and CV for scanned images) to document-centric business processes — NLP is a capability; IDP is its application.',
   sub:'AWS: Amazon Textract for extraction. NLP services (Comprehend, Translate) handle the language tasks within IDP.',
   section:'C3'},

  {type:'question',
   front:'When should an engineer choose ML over a rule-based solution? Give two conditions and a canonical example of each.',
   back:'Use ML when: (1) Complex Rules — too many edge cases (e.g., spam filtering). (2) Large Scale — massive datasets no human can manually process (e.g., real-time recommendations).',
   sub:'Skip ML when deterministic rules already solve the problem (e.g., tax calculation, unit conversion).',
   section:'D1'},

  {type:'question',
   front:'A product manager asks: "Should we use ML to calculate employee payroll?" What is the correct answer and reasoning?',
   back:'No. Payroll follows deterministic rules that are fully definable and consistent at any scale. ML adds cost and complexity with no benefit over a formula.',
   sub:'ML is not universally better — it is specifically better when rules cannot be defined or cannot scale.',
   section:'D1'},

  {type:'question',
   front:'A bank wants to predict whether a loan applicant will default. A data scientist wants to group customers into behavioral segments. Which ML technique applies to each?',
   back:'Default prediction → Supervised Classification (binary categorical output: default/no default). Customer grouping → Unsupervised Clustering (no labels — model discovers segments).',
   sub:'Labeled output needed → Supervised. No labels, discover structure → Unsupervised.',
   section:'E1–E2'},

  {type:'question',
   front:'What are the four components of Reinforcement Learning, and how do they interact?',
   back:'Agent (decision-maker) takes actions in an Environment, receiving Rewards for correct actions and Penalties for incorrect ones, developing a Policy that maximizes cumulative reward over time.',
   sub:'No labeled dataset — learns through trial and error. AWS example: DeepRacer (autonomous race car).',
   section:'E3'},

  {type:'question',
   front:'What are the seven capabilities of Generative AI? List them all.',
   back:'Adaptability · Responsiveness · Simplicity · Creativity · Data Efficiency · Personalization · Scalability',
   sub:'Core value proposition: automation + creativity at scale — simultaneously. Traditional automation lacked creativity; human creativity lacked scale.',
   section:'F1'},

  {type:'question',
   front:'Define hallucination in the context of Generative AI. Why does it occur, and what is the primary mitigation strategy?',
   back:'Hallucination = plausible but factually false output. It occurs because the model predicts statistically likely text, not correct text — it has no concept of truth. Primary mitigation: Guardrails + RAG (grounding outputs in retrieved factual sources).',
   sub:'Primary exam-tested risk. AI outputs must always be verified before use in high-stakes contexts.',
   section:'G1'},

  {type:'question',
   front:'What is the difference between Toxicity and Social Risks as Generative AI challenges?',
   back:'Toxicity = offensive, harmful, or discriminatory outputs from biased training data or adversarial prompts (content quality). Social Risks = reputationally harmful outputs like deepfakes or misinformation that damage brand integrity or public trust (societal impact).',
   sub:'Both are output-level risks but differ in origin and impact scope.',
   section:'G1'},

  {type:'question',
   front:'What are the five model selection factors, and which one is a hard gate that disqualifies a model regardless of performance?',
   back:'Five factors: Model Type · Performance · Constraints · Compliance · Cost. Compliance is the hard gate — a non-compliant model is disqualified regardless of accuracy.',
   sub:'GDPR, HIPAA, ethics policies, and org guidelines all fall under Compliance.',
   section:'H1'},

  {type:'question',
   front:'A healthcare startup needs a Foundation Model for a patient Q&A chatbot with strong reasoning and long context handling. Which FM is best suited, and why?',
   back:'Anthropic Claude — known for chat, reasoning, coding, and long context capabilities. It handles nuanced, multi-turn conversations with strong safety alignment.',
   sub:'Titan = embeddings/search. Jurassic-2 = text generation/summarization. Stable Diffusion = images. Claude = reasoning/chat.',
   section:'H2'},

  {type:'question',
   front:'What is ARPU, and how does it function as a business metric for evaluating Generative AI success?',
   back:'ARPU = Average Revenue Per User. It measures whether AI-driven personalization or recommendations translate to increased spending per customer — a direct revenue impact indicator.',
   sub:'Technical accuracy alone cannot confirm business value. ARPU connects model behavior to financial outcomes.',
   section:'I1'},

  {type:'question',
   front:'Why is technical performance insufficient as the sole measure of AI success? What is the correct success definition?',
   back:'A technically accurate model can still fail to create business value if it does not change user behavior, improve efficiency, or drive revenue. AI success = technical performance + business metric alignment — both are required.',
   sub:'Five business metrics: User Satisfaction · ARPU · Cross-Domain Performance · Conversion Rate · Efficiency.',
   section:'I1'},

  {type:'question',
   front:'Match each mitigation strategy to the risk it primarily addresses: Guardrails, Data Anonymization, RAG, Data Curation.',
   back:'Guardrails → Toxicity (filter harmful outputs). Data Anonymization → Privacy (protect PII). RAG → Hallucinations (ground outputs in facts). Data Curation → Toxicity + Bias (remove harmful training content).',
   sub:'Monitoring addresses Nondeterminism and drift. Model Testing addresses Bias and Regulatory risk pre-deployment.',
   section:'G2'}
];

/* ── ENGINE ── */
var _fc = {
  idx:0, got:0, missed:0, results:{},

  init:function(){
    this.idx=0;this.got=0;this.missed=0;this.results={};
    this.render();
  },

  render:function(){
    var c=CARDS[this.idx];
    if(!c){this.summary();return;}
    var n=this.idx+1, total=CARDS.length;
    var pct=Math.round(n/total*100);
    document.getElementById('fc-progress').textContent='Card '+n+' of '+total;
    document.getElementById('prog-label').textContent='Card '+n+' of '+total;
    document.getElementById('prog-pct').textContent=pct+'%';
    document.getElementById('prog-fill').style.width=pct+'%';

    var lbl=document.getElementById('card-type-label');
    lbl.textContent=c.type==='term'?'Term':'Question';
    lbl.className='card-type-label '+(c.type==='term'?'ctl-term':'ctl-question');

    document.getElementById('fc-front').textContent=c.front;
    document.getElementById('fc-back-main').textContent=c.back;
    var subEl=document.getElementById('fc-back-sub');
    subEl.textContent=c.sub||'';
    subEl.style.display=c.sub?'block':'none';
    document.getElementById('fc-ref').textContent=c.section+' · Module 2';

    document.getElementById('fc-card').classList.remove('flipped');
    document.getElementById('fc-flip-btn').style.display='flex';
    document.getElementById('fc-actions').style.display='none';

    document.getElementById('ss-got').textContent=this.got;
    document.getElementById('ss-missed').textContent=this.missed;
    document.getElementById('ss-remain').textContent=total-this.got-this.missed;
  },

  flip:function(){
    document.getElementById('fc-card').classList.add('flipped');
    document.getElementById('fc-flip-btn').style.display='none';
    document.getElementById('fc-actions').style.display='flex';
  },

  mark:function(correct){
    this.results[this.idx]=correct;
    if(correct)this.got++;else this.missed++;
    this.idx++;
    if(this.idx>=CARDS.length){this.summary();return;}
    this.render();
  },

  next:function(){if(this.idx<CARDS.length-1){this.idx++;this.render();}},
  prev:function(){if(this.idx>0){this.idx--;this.render();}},

  summary:function(){
    var total=CARDS.length;
    var pct=total>0?Math.round(this.got/total*100):0;
    var missedSections=[];
    for(var i in this.results){
      if(!this.results[i]){
        var s=CARDS[i].section;
        if(missedSections.indexOf(s)===-1)missedSections.push(s);
      }
    }
    missedSections.sort();

    var reviewHtml='';
    if(missedSections.length>0){
      reviewHtml='<div class="fc-sum-review"><div class="fc-sum-review-lbl">Sections to Review</div>'+missedSections.join(' · ')+'</div>';
    }

    var html='<div class="fc-summary">'+
      '<div class="fc-sum-title">Session Complete — '+total+' cards</div>'+
      '<div class="fc-sum-score">'+pct+'%</div>'+
      '<div class="fc-sum-detail">'+this.got+' got it · '+this.missed+' missed</div>'+
      '<div class="fc-sum-rows">'+
        '<div class="fc-sum-row"><span class="fc-sum-row-lbl">Got it</span><span class="fc-sum-val-g">'+this.got+' / '+total+'</span></div>'+
        '<div class="fc-sum-row"><span class="fc-sum-row-lbl">Missed it</span><span class="fc-sum-val-m">'+this.missed+' / '+total+'</span></div>'+
      '</div>'+
      reviewHtml+
      '<button class="fc-sum-restart" onclick="_fc.restart()">Restart Session</button>'+
    '</div>';

    document.getElementById('fc-progress').style.display='none';
    document.getElementById('card-type-label').style.display='none';
    document.querySelector('.fc-scene').innerHTML=html;
    document.querySelector('.score-strip').style.display='none';
    document.getElementById('fc-flip-btn').style.display='none';
    document.getElementById('fc-actions').style.display='none';
    document.querySelector('.fc-nav').style.display='none';

    document.getElementById('prog-label').textContent='Complete';
    document.getElementById('prog-pct').textContent='100%';
    document.getElementById('prog-fill').style.width='100%';
  },

  restart:function(){
    document.querySelector('.fc-scene').innerHTML=
      '<div class="fc-card" id="fc-card">'+
        '<div class="fc-face">'+
          '<span class="face-label">Prompt</span>'+
          '<div class="fc-front-text" id="fc-front"></div>'+
        '</div>'+
        '<div class="fc-face fc-back-face">'+
          '<span class="face-label face-label-back">Answer</span>'+
          '<div class="fc-back-text" id="fc-back-main"></div>'+
          '<div class="fc-back-sub" id="fc-back-sub"></div>'+
          '<div class="fc-ref" id="fc-ref"></div>'+
        '</div>'+
      '</div>';
    document.getElementById('fc-progress').style.display='block';
    document.getElementById('card-type-label').style.display='block';
    document.querySelector('.score-strip').style.display='flex';
    document.getElementById('fc-flip-btn').style.display='flex';
    document.querySelector('.fc-nav').style.display='flex';
    this.init();
  }
};

_fc.init();
</script>
</body>
</html>
